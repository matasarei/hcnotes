version: '3.9'

services:
  php:
    build:
      context: docker/php
    container_name: aicmf_php
    volumes:
      - .:/var/www/html
      - ./data:/var/www/html/data
      - ./content:/var/www/html/content
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-changeme}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///%kernel.project_dir%/data/app.db}
      AI_KEY: ${AI_KEY:-}
    networks:
      - aicmf

  nginx:
    build:
      context: docker/nginx
    container_name: aicmf_nginx
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - php
    networks:
      - aicmf

networks:
  aicmf:
    driver: bridge
