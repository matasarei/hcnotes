services:
  php:
    build:
      context: docker/php
    container_name: aicmf_php
    volumes:
      - .:/var/www/html
      - ./data:/var/www/html/data
      - ./content:/var/www/html/content
    # App configuration (APP_ENV, APP_SECRET, DATABASE_URL, AI_KEY) is loaded from
    # .env / .env.local by Symfony Dotenv inside the mounted project. We deliberately
    # do NOT inject these as container environment variables: real env vars take
    # precedence over .env.local, which would block setting APP_ENV=prod (and other
    # production values) in .env.local on the server. See .env.local.example.
    networks:
      - aicmf

  nginx:
    build:
      context: docker/nginx
    container_name: aicmf_nginx
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - php
    networks:
      - aicmf

networks:
  aicmf:
    driver: bridge
